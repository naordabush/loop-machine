<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Machine</title>
    <link rel="stylesheet" href="icono.min.css" />
    <link rel="stylesheet" href="https://icono-49d6.kxcdn.com/icono.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div style="width: 50px; height: 50px"></div>
    <div class="audio-player player1">
      <div class="timeline">
        <div class="progress">
          <span></span>
        </div>
      </div>
      <div class="controls">
        <div class="play-container">
          <div class="toggle-play play"></div>
        </div>
        <div class="time">
          <div class="current">0:00</div>
          <div class="divider">/</div>
          <div class="length"></div>
        </div>
        <div class="name" id="loop" style="cursor: pointer">
          <span onclick="loopFun()" style="background-color: coral; margin: 0px 5px; padding: 5px">Loop off</span>
          <span onclick="offFun()" style="background-color: coral; margin: 0px 5px; padding: 5px">Loop on</span>
          <span onclick="stop()" style="background-color: coral; margin: 0px 5px; padding: 5px">Stop</span>
        </div>
        <div class="volume-container">
          <div class="volume-button">
            <div class="volume icono-volumeMedium"></div>
          </div>
        </div>
      </div>
    </div>

    <div style="width: 50px; height: 50px"></div>

      <div class="timeline2">

        <div class="time2">
          <div class="current">0:00</div>
          <div class="divider">/</div>
          <div class="length"></div>
        </div>
        <div class="name">Music Song</div>
        <div class="volume-container2">
          <div class="volume-button2">
            <div class="volume2 icono-volumeMedium"></div>
          </div>

          <div class="volume-slider2">
            <div class="volume-percentage"></div>
          </div>
        </div>
      </div>
    </div>
